name: case_v08_interception_validates_structurally
kind: validation
given:
  areas: [AREA_A, AREA_B, AREA_C]
  edges:
    - { from: AREA_A, to: AREA_B, cost: 1 }
    - { from: AREA_B, to: AREA_C, cost: 1 }
  corps:
    - { id: CORPS_FRA_001, owner: FRA, area: AREA_A }
when:
  order:
    kind: INTERCEPTION
    submitter: FRA
    corps: CORPS_FRA_001
    target_area: AREA_C
    condition: "any"
then:
  plan:
    kind: INTERCEPTION_QUEUED
    target: AREA_C
note: |
  Per docs/adjudications.md 0001, Phase 2 only validates structurally.
  The queued order does not fire until the impulse model lands in
  Phase 10.
