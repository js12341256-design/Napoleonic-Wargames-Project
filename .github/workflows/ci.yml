# CI pipeline per PROMPT.md §16.1 (Phase 0 gate) and §2.6/§2.7 (determinism).
# The cross-platform matrix here covers the §2.7 weekly determinism check.
# Secondary checks (axe-core, license scanner) are wired as they become
# applicable (Phase 15 onward).

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Default determinism seed from PROMPT.md §23.5.
  GC1805_DETERMINISM_SEED: "0x5EEDED0000000001"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace --all-targets

  # The /web package is a placeholder until Phase 15.  Skip the job
  # entirely until web/package-lock.json exists; otherwise
  # actions/setup-node fails when its cache-dependency-path is missing.
  web-lint:
    runs-on: ubuntu-latest
    if: hashFiles('web/package-lock.json') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: echo "Phase 15+: real web lint runs here."
