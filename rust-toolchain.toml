# Per PROMPT.md §3.6 the toolchain should be pinned to a specific
# minor version, updated quarterly with an ADR.  We are tracking
# `stable` until the project picks an explicit pin in ADR 0002.
# See docs/questions.md Q9.
[toolchain]
channel = "stable"
components = ["rustfmt", "clippy"]
targets = ["wasm32-unknown-unknown"]
profile = "minimal"
